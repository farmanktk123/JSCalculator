<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project </title>

    <link rel="stylesheet" href="calcu.css">
</head>
<body>
    

    <div class="main-container">

        <div class="msg-box">
            <p>0</p>
        </div>

        <div class="refresh-box">
            <span>%</span>
            <span>C</span>
            <span>CE</span>
            <img src="download-removebg-preview (1).png" alt= "backspace">;
        </div>

        <div class="numeric-main-box">
            

            <div class="integer-box">
                <span>9</span>
                <span>8</span>
                <span>7</span>
                <span>6</span>
                <span>5</span>
                <span>4</span>
                <span>3</span>
                <span>2</span>
                <span>1</span>
                <span id="zero">0</span>
            </div>

            <div class="calcul-box">
                <span>/</span>
                <span>x</span>
                <span>+</span>
                <span>-</span>
                <span>=</span>
                <span>.</span>
            </div>


        </div>
    </div>

    <script src="Calcu.js"></script>

    <script src="server.js"></script>
</body>
</html>
